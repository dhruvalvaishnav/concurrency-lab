name: Daily Java Interview Engine

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 3 * * 1,3,4'  # Mon, Wed, Thu (8:30 AM IST)
  workflow_dispatch:

jobs:
  generate-java-skeleton:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run generator (rate-safe)
        env:
          GROQ_API_KEY: ${{ secrets.KAFKA_API_KEY }}
        run: python scripts/generate.py

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: daily java interview generation"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: daily java interview generation"
          branch: auto/java-daily
          title: "Daily Java Interview Engine Output"
          body: "Automated Java skeleton generation."
